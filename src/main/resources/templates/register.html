<!DOCTYPE html>
<html>
<head>
    <!-- Standard Meta -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

    <!-- Site Properties -->
    <title>注册 Register</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/reset.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/site.css">

    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/container.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/grid.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/header.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/image.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/menu.css">

    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/divider.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/segment.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/form.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/input.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/button.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/list.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/message.css">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/semantic-ui@2.4.2/dist/components/icon.css">

    <script src="https://unpkg.com/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://unpkg.com/semantic-ui@2.4.2/dist/components/form.js"></script>
    <script src="https://unpkg.com/semantic-ui@2.4.2/dist/components/transition.js"></script>

    <style type="text/css">
        body {
            background-color: #DADADA;
            background-image: url("../img/pic09.jpg");
            background-repeat: no-repeat;
            background-size: cover;
        }
        body > .grid {
            height: 100%;
        }
        .image {
            margin-top: -100px;
        }
        .column {
            max-width: 450px;
        }
        .content{
            color: black;
        }
    </style>
    <script>
        $(document)
            .ready(function() {
                $('.ui.form')
                    .form({
                        fields: {
                            email: {
                                identifier  : 'email',
                                rules: [
                                    {
                                        type   : 'empty',
                                        prompt : 'Please enter your e-mail'
                                    },
                                    {
                                        type   : 'email',
                                        prompt : 'Please enter a valid e-mail'
                                    }
                                ]
                            },
                            password: {
                                identifier  : 'password',
                                rules: [
                                    {
                                        type   : 'empty',
                                        prompt : 'Please enter your password'
                                    },
                                    {
                                        type   : 'length[6]',
                                        prompt : 'Your password must be at least 6 characters'
                                    }
                                ]
                            }
                        }
                    })
                ;
            })
        ;
    </script>
</head>
<body>

<div class="ui middle aligned center aligned grid" src="../img/pic08.jpg">
    <div class="column">
        <h1 style="color: black">基于深度学习的图像风格迁移系统</h1>
        <h2 class="ui teal image header">
            <!--<img src="../static/img/02.jpg" class="image">-->
            <div class="content">
                注册您的账户
            </div><br>
            <div class="content">
               Register to your account
            </div>
        </h2>
        <form class="ui large form" onsubmit="return false">
            <div class="ui stacked segment">
                <div class="field">
                    <div class="ui left icon input">
                        <i class="user icon"></i>
                        <input type="text" id="email" name="email" placeholder="邮箱  | E-mail address">
                    </div>
                </div>
                <div class="field">
                    <div class="ui left icon input">
                        <i class="lock icon"></i>
                        <input type="password" id="password" name="password" placeholder="密码 | Password">
                    </div>
                </div>
                <div class="field">
                    <div class="ui left icon input">
                        <i class="lock icon"></i>
                        <input type="password" name="repassword" placeholder="确认密码 | RePassword">
                    </div>
                </div>
                <div class="ui fluid large teal submit button" id="register">注册 Register</div>
            </div>

            <div class="ui error message"></div>

        </form>

        <div class="ui message">
            已经注册账号（Already signed up）?  <a href="/login">登录 Login</a>
        </div>
    </div>
</div>

<script type="text/javascript" charset="UTF-8">
    //注册账号
    $("#register").on("click",function () {
        $.ajax({
            url:"/user/create",
            type:"POST",
            data:{
                email:$("#email").val(),
                password:$("#password").val()
            },
            resultType:"JSON",
            success:function (result) {
                alert(result.message);
            },
            error:function (result) {

            }
        });
    })
</script>

</body>

</html>
