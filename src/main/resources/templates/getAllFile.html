<script type="text/javascript" th:inline="javascript">

    function downloadIamge() {
        var imgs = document.getElementById("download").getElementsByTagName("img");// 获取要下载的图片
        var i=imgs.length;
        var a = document.createElement('a');// 创建一个a节点插入的document
        a.download = 'img' + new Date().getTime() || '下载图片名称';//这边是文件名，可以自定义
        a.href = imgs[i].src; // 获取图片地址
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function reloadPage() {
        document.write("2s后刷新");
        var t = setTimeout(function(){window.location.reload();},2000);
    }
</script>
